name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest

      - name: Build exe
        run: uv run pyinstaller --name stampede --onedir --windowed --add-data "assets;assets" main.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stampede-windows
          path: dist/stampede/
